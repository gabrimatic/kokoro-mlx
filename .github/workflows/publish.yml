name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: none

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pinned build tools
        run: "python -m pip install --disable-pip-version-check --only-binary=:all: build==1.5.0 twine==6.2.0"

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
